name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/debug/
          test -f android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create source archive
        run: |
          tar -czf source.tar.gz \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=android \
            --exclude=.github \
            --exclude='*.tar.gz' \
            --exclude='*.zip' \
            .
          ls -la source.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          echo "Creating release for tag: $RELEASE_TAG"

          cat > release_body.txt << 'EOF'
          ## Download Files

          - **APK**: app-debug.apk
          - **Source Code**: source.tar.gz

          ## Build Info

          - Build Number: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
          EOF

          gh release create "$RELEASE_TAG" \
            --title "Storyboard Copilot $RELEASE_TAG" \
            --body-file release_body.txt \
            android/app/build/outputs/apk/debug/app-debug.apk \
            source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: Storyboard-Copilot-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            source.tar.gz
          retention-days: 30
