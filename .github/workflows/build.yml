name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/debug/
          test -f android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create source archive
        run: |
          find . -maxdepth 1 -type f -not -name 'source.tar.gz' -not -name '*.tar.gz' -not -name '*.zip' -print > files_to_archive.txt
          find . -maxdepth 1 -type d \( -name '.git' -o -name 'node_modules' -o -name 'dist' -o -name 'android' -o -name '.github' -o -name '.gitignore' -o -name '*.tar.gz' -o -name '*.zip' \) -prune -o -type f -print >> files_to_archive.txt 2>/dev/null
          tar -czf source.tar.gz -T files_to_archive.txt
          rm -f files_to_archive.txt
          ls -la source.tar.gz

      - name: Create Release with Assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          echo "Creating release for tag: $RELEASE_TAG"

          BODY=$(cat << 'BODYEOF'
          ## Download Files

          - **APK**: app-debug.apk
          - **Source Code**: source.tar.gz

          ## Build Info

          - Build Number: %BUILD_NUM%
          - Commit: %COMMIT_SHA%
          BODYEOF
          )
          BODY="${BODY//\%BUILD_NUM\%/${{ github.run_number }}}"
          BODY="${BODY//\%COMMIT_SHA\%/${{ github.sha }}}"

          RESPONSE=$(curl -s -L -X POST \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"$RELEASE_TAG\", \"name\": \"Storyboard Copilot $RELEASE_TAG\", \"body\": $(echo "$BODY" | jq -Rs .), \"draft\": false, \"prerelease\": false}")

          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "Created release ID: $RELEASE_ID"

          curl -s -L -X POST \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@android/app/build/outputs/apk/debug/app-debug.apk" \
            -H "Content-Length: $(stat -c%s android/app/build/outputs/apk/debug/app-debug.apk)" \
            | jq -r '.browser_upload_url' || true

          curl -s -L -X POST \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@source.tar.gz" \
            -H "Content-Length: $(stat -c%s source.tar.gz)" \
            | jq -r '.browser_upload_url' || true

          echo "Release created successfully!"

      - name: Upload artifacts
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: Storyboard-Copilot-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            source.tar.gz
          retention-days: 30
