name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/debug/
          if [ ! -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "ERROR: APK file not found!"
            exit 1
          fi
          echo "APK size: $(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)"

      - name: Create source archive
        run: |
          echo "Creating source archive..."
          tar -czf source.tar.gz \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=android \
            --exclude=.github \
            --exclude='*.tar.gz' \
            --exclude='*.zip' \
            *
          echo "Archive created: $(ls -la source.tar.gz)"
          echo "Source archive size: $(du -h source.tar.gz | cut -f1)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Storyboard-Copilot-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            source.tar.gz
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Creating release for tag: ${{ github.ref }}"
          echo "APK exists: $(ls -la android/app/build/outputs/apk/debug/app-debug.apk)"
          echo "Source archive exists: $(ls -la source.tar.gz)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            source.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
