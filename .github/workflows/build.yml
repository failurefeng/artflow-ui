name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        id: verify
        run: |
          echo "Checking APK..."
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "APK_SIZE=$(stat -c%s "$APK_PATH")" >> $GITHUB_OUTPUT
            echo "APK found!"
            ls -la "$APK_PATH"
          else
            echo "ERROR: APK not found!"
            exit 1
          fi

      - name: Get version and build info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD_NUM=${{ github.run_number }}
          BUILD_TYPE="debug"
          TAG_NAME="artflow-ui-${VERSION}-${BUILD_TYPE}-build${BUILD_NUM}"
          ASSET_BASE="artflow-ui-${VERSION}-${BUILD_TYPE}-build${BUILD_NUM}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_num=$BUILD_NUM" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "asset_base=$ASSET_BASE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Type: $BUILD_TYPE, Build: #$BUILD_NUM"
          echo "Tag Name: $TAG_NAME"

      - name: Create source archive
        run: |
          find . -maxdepth 1 -type f -not -name '*.tar.gz' -not -name '*.zip' -print > files_to_archive.txt
          find . -maxdepth 1 -type d \( -name '.git' -o -name 'node_modules' -o -name 'dist' -o -name 'android' -o -name '.github' -o -name '.gitignore' -o -name '*.tar.gz' -o -name '*.zip' \) -prune -o -type f -print >> files_to_archive.txt 2>/dev/null
          tar -czf source.tar.gz -T files_to_archive.txt
          rm -f files_to_archive.txt
          ls -la source.tar.gz

      - name: Check if release already exists
        id: check_release
        run: |
          TAG_NAME="${{ steps.version.outputs.tag_name }}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "release_exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG_NAME already exists"
          else
            echo "release_exists=false" >> $GITHUB_OUTPUT
            echo "Release $TAG_NAME does not exist"
          fi

      - name: Rename artifacts
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk ${{ steps.version.outputs.asset_base }}.apk
          ls -la ${{ steps.version.outputs.asset_base }}.apk

      - name: Create new Release
        if: success() && steps.check_release.outputs.release_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.version.outputs.tag_name }}"
          name: "ArtFlow UI ${{ steps.version.outputs.tag_name }}"
          body: |
            ArtFlow UI Build #${{ steps.version.outputs.build_num }}

            Version: ${{ steps.version.outputs.version }}
            Type: ${{ steps.version.outputs.build_type }}
            Build: #${{ steps.version.outputs.build_num }}

            Commit: ${{ github.sha }}

            APK: ${{ steps.version.outputs.asset_base }}.apk
            APK Size: ${{ env.APK_SIZE }} bytes
          files: |
            ${{ steps.version.outputs.asset_base }}.apk
            source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to existing Release
        if: success() && steps.check_release.outputs.release_exists == 'true'
        run: |
          TAG_NAME="${{ steps.version.outputs.tag_name }}"
          echo "Uploading assets to existing release $TAG_NAME..."
          gh release upload "$TAG_NAME" ${{ steps.version.outputs.asset_base }}.apk source.tar.gz --clobber
