name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/debug/
          test -f android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create source archive
        run: |
          find . -maxdepth 1 -type f -not -name 'source.tar.gz' -not -name '*.tar.gz' -not -name '*.zip' -print > files_to_archive.txt
          find . -maxdepth 1 -type d \( -name '.git' -o -name 'node_modules' -o -name 'dist' -o -name 'android' -o -name '.github' -o -name '.gitignore' -o -name '*.tar.gz' -o -name '*.zip' \) -prune -o -type f -print >> files_to_archive.txt 2>/dev/null
          tar -czf source.tar.gz -T files_to_archive.txt
          rm -f files_to_archive.txt
          ls -la source.tar.gz

      - name: Create Release
        id: create-release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          echo "Creating release for tag: $RELEASE_TAG"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$RELEASE_TAG\",\"name\":\"Storyboard Copilot v$RELEASE_TAG\",\"body\":\"Build ${{ github.run_number }}\"}")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" != "201" ]; then
            echo "Failed to create release"
            exit 1
          fi
          
          RELEASE_ID=$(echo "$BODY" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV
          echo "Release created with ID: $RELEASE_ID"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Uploading APK for release: $RELEASE_ID"
          APK_SIZE=$(stat -c%s ./android/app/build/outputs/apk/debug/app-debug.apk)
          echo "APK size: $APK_SIZE bytes"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            -H "Accept: application/vnd.github+json" \
            --data-binary "@./android/app/build/outputs/apk/debug/app-debug.apk" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=storyboard-copilot.apk")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" != "201" ]; then
            echo "Failed to upload APK"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload source archive
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Uploading source archive for release: $RELEASE_ID"
          SOURCE_SIZE=$(stat -c%s ./source.tar.gz)
          echo "Source size: $SOURCE_SIZE bytes"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/gzip" \
            -H "Accept: application/vnd.github+json" \
            --data-binary "@./source.tar.gz" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=source.tar.gz")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" != "201" ]; then
            echo "Failed to upload source archive"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: Storyboard-Copilot-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            source.tar.gz
          retention-days: 30
