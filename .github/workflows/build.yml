name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        id: verify
        run: |
          echo "Checking APK..."
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "APK_SIZE=$(stat -c%s "$APK_PATH")" >> $GITHUB_OUTPUT
            echo "APK found!"
            ls -la "$APK_PATH"
          else
            echo "ERROR: APK not found!"
            exit 1
          fi

      - name: Create source archive
        run: |
          find . -maxdepth 1 -type f -not -name 'source.tar.gz' -not -name '*.tar.gz' -not -name '*.zip' -print > files_to_archive.txt
          find . -maxdepth 1 -type d \( -name '.git' -o -name 'node_modules' -o -name 'dist' -o -name 'android' -o -name '.github' -o -name '.gitignore' -o -name '*.tar.gz' -o -name '*.zip' \) -prune -o -type f -print >> files_to_archive.txt 2>/dev/null
          tar -czf source.tar.gz -T files_to_archive.txt
          rm -f files_to_archive.txt
          ls -la source.tar.gz

      - name: Get version and build info
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=${GITHUB_SHA:0:7}
          TIMESTAMP=$(date +%Y%m%d%H%M)
          BUILD_NUM=${{ github.run_number }}
          ASSET_BASE="artflow-ui-${VERSION}-debug-${TIMESTAMP}"
          RELEASE_TAG="artflow-ui-${VERSION}-debug-${TIMESTAMP}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "build_num=$BUILD_NUM" >> $GITHUB_OUTPUT
          echo "asset_base=$ASSET_BASE" >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Short SHA: $SHORT_SHA, Timestamp: $TIMESTAMP, Build: #$BUILD_NUM"
          echo "Asset Base: $ASSET_BASE"

      - name: Rename artifacts
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk ${{ steps.version.outputs.asset_base }}.apk
          cp source.tar.gz ${{ steps.version.outputs.asset_base }}.tar.gz
          ls -la ${{ steps.version.outputs.asset_base }}.*

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.release_tag }}"
          name: "ArtFlow UI v${{ steps.version.outputs.release_tag }}"
          body: |
            ArtFlow UI v${{ steps.version.outputs.release_tag }}

            **Build #{{ steps.version.outputs.build_num }}**

            ArtFlow UI - AI 生图移动端应用

            ## 功能特性
            - 节点画布（添加、移动、选择节点）
            - AI 生图节点（GRSAI 服务商，支持 nano-banana-2 模型）
            - 图片节点（上传、本地图片支持）
            - 项目管理（创建、打开、删除项目）
            - 数据导出/导入（TXT 格式）
            - 节点复制功能

            ## 已修复
            - 屏幕旋转锁定功能
            - AI 生图节点分辨率和比例参数
            - 选项面板跟随节点移动

            Commit: ${{ github.sha }}

            APK Size: ${{ env.APK_SIZE }} bytes
          files: |
            ${{ steps.version.outputs.asset_base }}.apk
            ${{ steps.version.outputs.asset_base }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
