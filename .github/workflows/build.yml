name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/debug/
          test -f android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create source archive
        run: |
          find . -maxdepth 1 -type f -not -name 'source.tar.gz' -not -name '*.tar.gz' -not -name '*.zip' -print > files_to_archive.txt
          find . -maxdepth 1 -type d \( -name '.git' -o -name 'node_modules' -o -name 'dist' -o -name 'android' -o -name '.github' -o -name '.gitignore' -o -name '*.tar.gz' -o -name '*.zip' \) -prune -o -type f -print >> files_to_archive.txt 2>/dev/null
          tar -czf source.tar.gz -T files_to_archive.txt
          rm -f files_to_archive.txt
          ls -la source.tar.gz

      - name: Create Release with Tag
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const crypto = require('crypto');

            const commitSha = process.env.GITHUB_SHA.slice(0, 7);
            const runNumber = process.env.GITHUB_RUN_NUMBER;
            const tagName = `v0.0.0-${commitSha}`;
            const releaseName = `Storyboard Copilot v0.0.0 (Build ${runNumber})`;
            const body = `Auto-generated release from commit ${commitSha}\nBuild #${runNumber}`;

            console.log('Creating tag:', tagName);
            console.log('Creating release:', releaseName);

            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tagName}`,
                sha: context.sha
              });
              console.log('Tag created successfully');
            } catch (err) {
              if (err.status === 422) {
                console.log('Tag already exists, skipping tag creation');
              } else {
                throw err;
              }
            }

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: releaseName,
              body: body,
              draft: false,
              prerelease: false
            });
            console.log('Release created with ID:', release.data.id);

            const apkBuffer = fs.readFileSync('./android/app/build/outputs/apk/debug/app-debug.apk');
            const apkUpload = await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: 'storyboard-copilot.apk',
              data: apkBuffer,
              headers: {
                'content-type': 'application/vnd.android.package-archive',
                'content-length': apkBuffer.length
              }
            });
            console.log('APK uploaded:', apkUpload.data.browser_download_url);

            const sourceBuffer = fs.readFileSync('./source.tar.gz');
            const sourceUpload = await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: 'source.tar.gz',
              data: sourceBuffer,
              headers: {
                'content-type': 'application/gzip',
                'content-length': sourceBuffer.length
              }
            });
            console.log('Source uploaded:', sourceUpload.data.browser_download_url);
            console.log('=== Release created successfully ===');
