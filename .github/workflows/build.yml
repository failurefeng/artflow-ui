name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        id: verify
        run: |
          echo "Checking APK..."
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "APK_SIZE=$(stat -c%s "$APK_PATH")" >> $GITHUB_OUTPUT
            echo "APK found!"
            ls -la "$APK_PATH"
          else
            echo "ERROR: APK not found!"
            exit 1
          fi

      - name: Create source archive
        run: |
          find . -maxdepth 1 -type f -not -name 'source.tar.gz' -not -name '*.tar.gz' -not -name '*.zip' -print > files_to_archive.txt
          find . -maxdepth 1 -type d \( -name '.git' -o -name 'node_modules' -o -name 'dist' -o -name 'android' -o -name '.github' -o -name '.gitignore' -o -name '*.tar.gz' -o -name '*.zip' \) -prune -o -type f -print >> files_to_archive.txt 2>/dev/null
          tar -czf source.tar.gz -T files_to_archive.txt
          rm -f files_to_archive.txt
          ls -la source.tar.gz

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          TAG_NAME="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, will skip release creation"
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will create new release"
          fi

      - name: Create Release with Tag
        if: success() && steps.check_tag.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "Storyboard Copilot v${{ steps.version.outputs.version }}"
          body: |
            Storyboard Copilot v${{ steps.version.outputs.version }}

            这是 Storyboard Copilot 移动端的正式发布版本。

            ## 功能特性
            - AI 生图功能（支持多种模型服务商）
            - 分镜脚本生成
            - 图像编辑和处理
            - 数据导入导出
            - 屏幕旋转锁定
            - 后台运行支持

            Commit: ${{ github.sha }}

            APK Size: ${{ env.APK_SIZE }} bytes
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to existing Release
        if: success() && steps.check_tag.outputs.tag_exists == 'true'
        run: |
          echo "Tag already exists. Checking for existing release..."
          TAG_NAME="v${{ steps.version.outputs.version }}"
          RELEASE_ID=$(gh release view "$TAG_NAME" --json id --jq .id 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            echo "Uploading assets to existing release $RELEASE_ID..."
            gh release upload "$TAG_NAME" android/app/build/outputs/apk/debug/app-debug.apk source.tar.gz --clobber
          else
            echo "Release not found, creating new one..."
            gh release create "$TAG_NAME" android/app/build/outputs/apk/debug/app-debug.apk source.tar.gz --title "Storyboard Copilot v${{ steps.version.outputs.version }}"
          fi
