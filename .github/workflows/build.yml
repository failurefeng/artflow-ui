name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/debug/
          test -f android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create source archive
        run: |
          find . -maxdepth 1 -type f -not -name 'source.tar.gz' -not -name '*.tar.gz' -not -name '*.zip' -print > files_to_archive.txt
          find . -maxdepth 1 -type d \( -name '.git' -o -name 'node_modules' -o -name 'dist' -o -name 'android' -o -name '.github' -o -name '.gitignore' -o -name '*.tar.gz' -o -name '*.zip' \) -prune -o -type f -print >> files_to_archive.txt 2>/dev/null
          tar -czf source.tar.gz -T files_to_archive.txt
          rm -f files_to_archive.txt
          ls -la source.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$RELEASE_TAG" \
            --title "Storyboard Copilot v$RELEASE_TAG" \
            --body "Build ${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$RELEASE_TAG" ./android/app/build/outputs/apk/debug/app-debug.apk --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload source archive
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$RELEASE_TAG" ./source.tar.gz --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: Storyboard-Copilot-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            source.tar.gz
          retention-days: 30
