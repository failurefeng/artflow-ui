name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Wait 3 minutes for build to stabilize
        run: sleep 180

      - name: Verify APK exists
        id: verify
        run: |
          echo "Checking APK..."
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "APK_SIZE=$(stat -c%s "$APK_PATH")" >> $GITHUB_OUTPUT
            echo "APK found!"
            ls -la "$APK_PATH"
          else
            echo "ERROR: APK not found!"
            exit 1
          fi

      - name: Create source archive
        run: |
          find . -maxdepth 1 -type f -not -name 'source.tar.gz' -not -name '*.tar.gz' -not -name '*.zip' -print > files_to_archive.txt
          find . -maxdepth 1 -type d \( -name '.git' -o -name 'node_modules' -o -name 'dist' -o -name 'android' -o -name '.github' -o -name '.gitignore' -o -name '*.tar.gz' -o -name '*.zip' \) -prune -o -type f -print >> files_to_archive.txt 2>/dev/null
          tar -czf source.tar.gz -T files_to_archive.txt
          rm -f files_to_archive.txt
          ls -la source.tar.gz

      - name: Create Release with Tag
        if: success()
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          SOURCE_PATH="source.tar.gz"

          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: APK not found at $APK_PATH"
            exit 1
          fi

          if [ ! -f "$SOURCE_PATH" ]; then
            echo "ERROR: Source archive not found at $SOURCE_PATH"
            exit 1
          fi

          echo "Ready to create release!"
          echo "APK size: $(stat -c%s "$APK_PATH") bytes"
          echo "Source size: $(stat -c%s "$SOURCE_PATH") bytes"

      - name: Upload to Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.sha }}
          name: "Storyboard Copilot Build ${{ github.run_number }}"
          body: |
            Auto-generated release from commit ${{ github.sha }}
            
            Build #${{ github.run_number }}
            
            APK Size: ${{ env.APK_SIZE }} bytes
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
