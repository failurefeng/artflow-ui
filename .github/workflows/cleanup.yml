name: Cleanup Old Releases and Tags

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get all releases
        id: releases
        run: |
          echo "releases=$(gh release list --limit 100 --json tagName -q '.[].tagName' | tr -d '[]" ')" >> $GITHUB_OUTPUT

      - name: Delete old releases (keep latest)
        run: |
          CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Current tag: $CURRENT_TAG"
          echo "All releases:"
          gh release list

          for release in $(gh release list --json tagName -q '.[].tagName'); do
            if [ "$release" != "$CURRENT_TAG" ]; then
              echo "Deleting release: $release"
              gh release delete "$release" --yes || true
            else
              echo "Keeping release: $release (current)"
            fi
          done

      - name: Delete old tags (keep current)
        run: |
          CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Current tag: $CURRENT_TAG"

          for tag in $(git tag); do
            if [ "$tag" != "$CURRENT_TAG" ]; then
              echo "Deleting local tag: $tag"
              git tag -d "$tag" || true
              echo "Deleting remote tag: $tag"
              git push origin :refs/tags/"$tag" || true
            else
              echo "Keeping tag: $tag (current)"
            fi
          done

      - name: Verify cleanup
        run: |
          echo "Remaining releases:"
          gh release list
          echo ""
          echo "Remaining tags:"
          git tag
