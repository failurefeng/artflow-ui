name: Mark Keep Version

on:
  workflow_dispatch:
    inputs:
      base_version:
        description: 'Base version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      build_number:
        description: 'Build number to mark as keep (leave empty for latest)'
        required: false
        default: ''

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'
  KEEP_VERSION: 'true'
  BASE_VERSION: ${{ github.event.inputs.base_version }}

jobs:
  build-keep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/debug/
          test -f android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create source archive
        run: |
          find . -maxdepth 1 -type f -not -name 'source.tar.gz' -not -name '*.tar.gz' -not -name '*.zip' -print > files_to_archive.txt
          find . -maxdepth 1 -type d \( -name '.git' -o -name 'node_modules' -o -name 'dist' -o -name 'android' -o -name '.github' -o -name '.gitignore' -o -name '*.tar.gz' -o -name '*.zip' \) -prune -o -type f -print >> files_to_archive.txt 2>/dev/null
          tar -czf source.tar.gz -T files_to_archive.txt
          rm -f files_to_archive.txt

      - name: Create Release with Tag (Keep Version)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const baseVersion = process.env.BASE_VERSION || '1.0.0';
            const tagName = `v${baseVersion}`;
            const releaseName = `Storyboard Copilot v${baseVersion} ⭐ 值得留存`;

            const body = `## 重要版本 ⭐

这是一个值得留存的版本。

### 主要功能
- ✅ 修复了 GRSAI AI 生图功能
- ✅ 基本的图片生成能力
- ✅ 数据存储在外部存储目录

### 数据迁移说明
此版本将数据存储在外部存储目录，方便版本升级时保留数据：
- **数据目录**: \`Android/data/com.storyboardcopilot.app/files/\`
- **包含**: API 配置、项目数据

升级前请确保数据已保存在上述目录。

---
Build from commit ${process.env.GITHUB_SHA.slice(0, 7)}`;

            console.log('Creating KEEP version tag:', tagName);
            console.log('Creating KEEP release:', releaseName);

            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tagName}`,
                sha: context.sha
              });
              console.log('Tag created successfully');
            } catch (err) {
              if (err.status === 422) {
                console.log('Tag already exists, updating...');
                await github.rest.git.updateRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/tags/${tagName}`,
                  sha: context.sha,
                  force: true
                });
              } else {
                throw err;
              }
            }

            // Delete existing release with same tag if exists
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id
              });
              console.log('Existing release deleted');
            } catch (err) {
              if (err.status !== 404) console.log('No existing release to delete');
            }

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: releaseName,
              body: body,
              draft: false,
              prerelease: false
            });
            console.log('Release created with ID:', release.data.id);

            const apkBuffer = fs.readFileSync('./android/app/build/outputs/apk/debug/app-debug.apk');
            const apkUpload = await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: 'storyboard-copilot.apk',
              data: apkBuffer,
              headers: {
                'content-type': 'application/vnd.android.package-archive',
                'content-length': apkBuffer.length
              }
            });
            console.log('APK uploaded:', apkUpload.data.browser_download_url);

            const sourceBuffer = fs.readFileSync('./source.tar.gz');
            const sourceUpload = await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: 'source.tar.gz',
              data: sourceBuffer,
              headers: {
                'content-type': 'application/gzip',
                'content-length': sourceBuffer.length
              }
            });
            console.log('Source uploaded:', sourceUpload.data.browser_download_url);
            console.log('=== Keep Version Release created successfully ===');
